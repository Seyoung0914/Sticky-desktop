name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  APP_NAME: SYMOA

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      # Tauri 빌드
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '${{ env.APP_NAME }} ${{ github.ref_name }}'
          releaseBody: |
            ## ${{ env.APP_NAME }} ${{ github.ref_name }}
            
            ### 컴퓨터용 (PC & Mac) 다운로드
            - **👉 macOS (Apple Silicon - M1/M2/M3 등 최신)**: 파일명에 `aarch64`가 포함된 `.dmg` 다운로드
            - **👉 macOS (Intel - 2020년 이전 구형)**: 파일명에 `x64`가 포함된 `.dmg` 다운로드
            - **👉 Windows**: `.exe` 다운로드
            
            ### 스마트폰용 (Android) 다운로드
            - **👉 Android**: `.apk` 다운로드
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  build-android:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;25.0.8775105"

      - name: Setup NDK Env
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/25.0.8775105" >> $GITHUB_ENV

      - name: Init Android Project
        run: npx tauri android init --ci

      - name: Build Android APK
        run: npm run tauri android build -- --apk

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
